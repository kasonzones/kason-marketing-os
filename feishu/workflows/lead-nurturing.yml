# ============================================================
# 飞书工作流配置指南：线索培育自动化流程
# ============================================================
# 适用模块：飞书多维表格自动化 (Feishu Bitable Automation)
# 创建方式：飞书 → 多维表格 → 自动化 → 新建工作流
# ============================================================

workflow:
  name: "线索培育自动化流程"
  description: >
    当网站表单提交新线索并在线索表中创建记录时，自动进行线索评分、
    高意向线索提醒、任务分配、广告活动计数更新、欢迎邮件发送及日志记录。

# ============================================================
# 一、触发器配置
# ============================================================
trigger:
  type: "记录创建触发"  # 飞书自动化中：新建记录时触发
  config:
    table_name: "线索管理表"  # 线索表格名称
    trigger_event: "新建记录"
    record_source: "Webhook接入"  # 来自网站表单的 Webhook 数据写入
    # 注意：需要先配置飞书 Webhook URL 接收外部表单数据

# ============================================================
# 二、前置准备（飞书权限要求）
# ============================================================
permissions:
  - "多维表格：读取记录"              # 读取线索表、活动表记录
  - "多维表格：修改记录"              # 更新线索表、活动表记录
  - "多维表格：创建记录"              # 在任务表中创建跟进任务
  - "多维表格：创建/修改 Webhook 配置" # 接收外部表单数据
  - "消息推送：发送飞书卡片消息"      # 发送高意向线索提醒
  - "调用 Webhook"                   # 调用邮件平台 API

# ============================================================
# 三、步骤详细配置
# ============================================================

steps:

  # --- 步骤 1：线索自动评分 ---
  - step: 1
    name: "线索自动评分计算"
    action_type: "修改记录"  # 更新当前线索记录的评分字段
    config:
      table: "线索管理表"
      record_source: "触发记录"
      field_updates:
        - field: "线索评分"
          value_type: "公式计算"  # 使用飞书公式字段
          formula: >
            IF(
              {{公司规模}} = "500+", 30,
              IF({{公司规模}} = "100-500", 20,
              IF({{公司规模}} = "10-100", 10, 5))
            )
            +
            IF(
              {{行业}} = "科技/互联网", 25,
              IF({{行业}} = "金融/保险", 20,
              IF({{行业}} = "制造业", 15,
              IF({{行业}} = "医疗/健康", 18,
              IF({{行业}} = "教育/培训", 12, 10))))
            )
            +
            IF(
              {{来源渠道}} = "官网表单", 20,
              IF({{来源渠道}} = "广告投放", 25,
              IF({{来源渠道}} = "展会活动", 15,
              IF({{来源渠道}} = "合作伙伴推荐", 20,
              IF({{来源渠道}} = "社交媒体", 12, 10))))
            )
            +
            IF({{联系方式}} != "", 15, 0)
            +
            IF({{需求描述}} != "", 10, 0)
        # 评分规则说明：
        # 公司规模: 500+(30分) 100-500(20分) 10-100(10分) <10(5分)
        # 行业: 科技/互联网(25分) 金融/保险(20分) 医疗/健康(18分) 制造业(15分) 教育/培训(12分) 其他(10分)
        # 来源渠道: 广告投放(25分) 官网表单(20分) 合作伙伴推荐(20分) 展会活动(15分) 社交媒体(12分) 其他(10分)
        # 有联系方式: +15分
        # 有需求描述: +10分
        # 满分: 30+25+25+15+10 = 105分
        # 高意向阈值: >= 70分

  # --- 步骤 2：高意向线索飞书卡片通知 ---
  - step: 2
    name: "高意向线索通知负责人"
    action_type: "条件分支 → 发送飞书卡片消息"
    config:
      condition:
        type: "字段比较"
        field: "线索评分"
        operator: "大于等于 (>=)"
        value: 70
      branch_when_true:
        action_type: "发送飞书消息"
        config:
          message_type: "card"
          recipient:
            type: "人员字段"
            field: "{{负责人}}"  # 从线索记录中获取
          card_template:
            header:
              title: "🔔 高意向线索提醒"
              template: "red"
            body:
              - type: "markdown"
                content: >
                  **收到一条高意向线索，请尽快跟进！**\n\n
                  🏢 **公司名称**：{{公司名称}}\n
                  👤 **联系人**：{{联系人姓名}}\n
                  📧 **邮箱**：{{邮箱}}\n
                  📞 **电话**：{{电话}}\n
                  🏭 **行业**：{{行业}}\n
                  👥 **公司规模**：{{公司规模}}\n
                  📊 **线索评分**：{{线索评分}} 分\n
                  📍 **来源渠道**：{{来源渠道}}\n
                  📝 **需求描述**：{{需求描述}}
            actions:
              - type: "button"
                text: "查看线索详情"
                url: "{{LEADS_TABLE_RECORD_URL}}"  # 线索记录链接
                color: "danger"
      branch_when_false:
        step: "skip"
        name: "跳过通知"
        description: "线索评分 < 70，不发送高意向通知"

  # --- 步骤 3：创建跟进任务 ---
  - step: 3
    name: "创建高意向线索跟进任务"
    action_type: "条件分支 → 创建记录"
    config:
      condition:
        type: "字段比较"
        field: "线索评分"
        operator: "大于等于 (>=)"
        value: 70
      branch_when_true:
        action_type: "创建记录"
        config:
          table: "任务管理表"
          field_values:
            - field: "任务标题"
              value: "跟进高意向线索 - {{公司名称}}"
            - field: "任务类型"
              value: "线索跟进"
            - field: "优先级"
              value: "P0"  # 最高优先级
            - field: "负责人"
              value: "{{负责人}}"
            - field: "截止日期"
              value: "{{DATE_ADD(NOW(), 1, 'day')}}"  # 今天+1天
            - field: "关联客户"
              value: "{{公司名称}}"
            - field: "关联线索ID"
              value: "{{当前记录.记录ID}}"
            - field: "任务描述"
              value: >
                高意向线索需要立即跟进。\n\n
                客户信息：\n
                - 公司：{{公司名称}}\n
                - 联系人：{{联系人姓名}}\n
                - 邮箱：{{邮箱}}\n
                - 电话：{{电话}}\n
                - 行业：{{行业}}\n
                - 评分：{{线索评分}} 分\n\n
                建议行动：\n
                1. 24小时内电话联系\n
                2. 发送产品资料和案例\n
                3. 预约产品演示\n
                4. 评估客户需求匹配度
            - field: "状态"
              value: "待处理"
            - field: "创建日期"
              value: "{{NOW()}}"
      branch_when_false:
        step: "skip"
        name: "跳过任务创建"
        description: "线索评分 < 70，不创建紧急跟进任务"

  # --- 步骤 4：广告活动线索计数更新 ---
  - step: 4
    name: "更新广告活动线索计数"
    action_type: "条件分支 → 修改记录"  # 先匹配再更新
    config:
      condition:
        type: "文本包含"
        field: "{{来源渠道}}"
        contains: "广告"  # 来源渠道包含"广告"关键词
      branch_when_true:
        action_type: "修改记录"
        config:
          table: "活动管理表"
          record_match:
            # 在活动表中查找关联的活动记录
            match_field: "活动ID"
            match_value: "{{关联活动ID}}"
          field_updates:
            - field: "线索数量"
              value: "{{线索数量 + 1}}"  # 在当前值基础上+1
              mode: "累加"
            - field: "最后线索时间"
              value: "{{NOW()}}"
      branch_when_false:
        step: "skip"
        description: "非广告来源，跳过活动计数更新"

  # --- 步骤 5：发送欢迎邮件 ---
  - step: 5
    name: "发送欢迎邮件"
    action_type: "条件分支 → 调用Webhook"
    config:
      condition:
        type: "字段非空"
        field: "{{邮箱}}"
      branch_when_true:
        action_type: "调用Webhook"
        config:
          method: "POST"
          url: "https://your-email-platform.com/api/send-email"
          headers:
            Content-Type: "application/json"
            Authorization: "Bearer {{EMAIL_API_SECRET_TOKEN}}"
          body_type: "JSON"
          body:
            to_email: "{{邮箱}}"
            to_name: "{{联系人姓名}}"
            template_id: "welcome_lead_nurturing_v1"  # 欢迎邮件模板ID
            template_variables:
              contact_name: "{{联系人姓名}}"
              company_name: "{{公司名称}}"
              industry: "{{行业}}"
              source: "{{来源渠道}}"
            tracking:
              campaign: "lead_nurturing"
              source: "{{来源渠道}}"
          timeout_seconds: 15
          retry:
            max_retries: 2
            retry_delay_seconds: 5
      branch_when_false:
        step: "skip"
        name: "跳过邮件发送"
        description: "线索无邮箱地址，跳过欢迎邮件"

  # --- 步骤 6：记录工作流日志 ---
  - step: 6
    name: "记录到工作流日志表"
    action_type: "创建记录"
    config:
      table: "工作流日志表"
      field_values:
        - field: "工作流名称"
          value: "线索培育自动化流程"
        - field: "触发时间"
          value: "{{NOW()}}"
        - field: "操作类型"
          value: "线索培育"
        - field: "关联记录ID"
          value: "{{当前记录.记录ID}}"
        - field: "关联线索"
          value: "{{公司名称}} - {{联系人姓名}}"
        - field: "执行步骤"
          value: "步骤1(评分) → 步骤2(通知检查) → 步骤3(任务检查) → 步骤4(活动计数) → 步骤5(欢迎邮件)"
        - field: "执行结果"
          value: "成功"
        - field: "线索评分"
          value: "{{线索评分}}"
        - field: "是否为高意向"
          value: "{{IF(线索评分 >= 70, '是', '否')}}"
        - field: "是否发送邮件"
          value: "{{IF(邮箱 != '', '是', '否')}}"

# ============================================================
# 四、错误处理说明
# ============================================================
error_handling:
  global:
    on_email_webhook_failure:
      - "重试 2 次，间隔 5 秒"
      - "失败后记录日志，标记'邮件发送失败'"
      - "不阻塞主流程继续执行"
    on_score_calculation_error:
      - "若关键评分字段（公司规模/行业/来源渠道）为空，赋予默认值"
      - "在日志中记录评分为 0 的线索"
    on_activity_not_found:
      - "活动表匹配失败时跳过计数更新，记录日志"
    on_rate_limit:
      - "若飞书 API 频率限制触发，等待并重试"
  fallback_notification:
    title: "⚠️ 线索培育流程异常"
    message: "线索\"{{公司名称}}\"处理异常。\n步骤：{{failed_step}}\n错误：{{error_message}}"
    recipients: ["系统管理员"]

# ============================================================
# 五、所需数据表字段清单
# ============================================================
required_fields:
  线索管理表:
    - 公司名称 (文本)
    - 联系人姓名 (文本)
    - 邮箱 (邮箱/文本)
    - 电话 (文本)
    - 行业 (单选: 科技/互联网, 金融/保险, 制造业, 医疗/健康, 教育/培训, 其他)
    - 公司规模 (单选: 1-10, 10-100, 100-500, 500+)
    - 来源渠道 (单选: 官网表单, 广告投放, 展会活动, 合作伙伴推荐, 社交媒体, 其他)
    - 需求描述 (多行文本)
    - 联系方式 (文本)
    - 线索评分 (数字) - 自动计算公式字段
    - 负责人 (人员)
    - 关联活动ID (文本)
    - 生命周期阶段 (单选: 新线索, MQL, SQL, 商机, 成交, 关闭)
  活动管理表:
    - 活动ID (文本)
    - 线索数量 (数字)
    - 最后线索时间 (日期时间)
  任务管理表:
    - 任务标题 (文本)
    - 任务类型 (单选)
    - 优先级 (单选: P0, P1, P2, P3)
    - 负责人 (人员)
    - 截止日期 (日期)
    - 关联客户 (文本)
    - 关联线索ID (文本)
    - 任务描述 (多行文本)
    - 状态 (单选: 待处理, 进行中, 已完成, 已关闭)
    - 创建日期 (日期时间)
  工作流日志表:
    - 工作流名称 (文本)
    - 触发时间 (日期时间)
    - 操作类型 (文本)
    - 关联记录ID (文本)
    - 关联线索 (文本)
    - 执行步骤 (文本)
    - 执行结果 (单选: 成功, 失败, 部分成功)
    - 线索评分 (数字)
    - 是否为高意向 (文本)
    - 是否发送邮件 (文本)

# ============================================================
# 六、测试验证清单
# ============================================================
test_checklist:
  - "通过 Webhook 模拟提交一条高意向线索（公司规模500+，行业科技/互联网，来源广告投放）"
  - "验证线索评分计算结果是否正确（预期 >= 70 分）"
  - "检查负责人是否收到飞书卡片通知"
  - "检查任务表是否有 P0 级别跟进任务，截止日期是否为今天+1天"
  - "检查活动表的线索数量是否正确+1"
  - "检查邮箱是否收到欢迎邮件"
  - "检查工作流日志表是否有完整记录"
  - "测试低意向线索（评分 < 70）：确认不发送通知、不创建任务"
  - "测试无邮箱线索：确认跳过邮件发送环节"
  - "测试无关联活动ID的线索：确认跳过活动计数"
